# maintenance config — ~/.config/maintenance/config.toml
# All tasks enabled by default. Set to false to disable.
# Environment variables (MAINTENANCE_<TASK>=false) override this file.

[tasks]
# brew_update = true
# brew_upgrade = true
# gcloud = true
# pnpm = true
# uv = true
# fisher = true
# mo_clean = true
# mo_optimize = true
# mo_purge = true
# brew_cleanup = true
# brew_bundle = true

[frequency]
# Default: "weekly". Options: "weekly", "monthly"
# Recommended: monthly for cache pruning tasks
# gcloud = "monthly"
# pnpm = "monthly"
# uv = "monthly"
# mo_purge = "monthly"
# brew_cleanup = "monthly"

[paths]
# Brewfile path (auto-detected from common locations if unset)
# brewfile = "~/.config/Brewfile"

[notifications]
# macOS notification on completion (non-interactive/launchd runs only)
# Override via MAINTENANCE_NOTIFY=false environment variable
# enabled = true
# sound = "Submarine"  # set to "" for silent
